extends: generic_to_crm

targets:
  lead:
    table: nb_crm_leads
    fields:
      - source: first-name
        target: name
        transform: strip
      - source: your-email
        target: email
        transform: strip
      - source: company
        target: company
        transform: strip
      - source: phone
        target: phone
        transform: strip
      - source: function
        target: title
        transform: strip
      - source: message
        target: description
        transform: strip
      - source: form_id
        target: status
        transform: const:new
      - source: form_id
        target: source
        transform: strip

  contact:
    table: nb_crm_contacts
    fields:
      - source: first-name
        target: name
        transform: strip
      - source: your-email
        target: email
        transform: strip
      - source: phone
        target: phone
        transform: strip
      - source: function
        target: title
        transform: strip
      - source: form_id
        target: lead_source
        transform: strip
      - source: message
        target: extra.message
        transform: strip

  company:
    table: nb_crm_customers
    fields:
      - source: company
        target: name
        transform: strip
      - source: company-website
        target: website
        transform: strip
      - source: form_id
        target: source_system
        transform: const:webform
      - source: message
        target: extra.description
        transform: strip
