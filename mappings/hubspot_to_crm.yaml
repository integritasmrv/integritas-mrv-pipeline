targets:
  contact:
    table: nb_crm_contacts
    fields:
      - source: properties.firstname
        target: name
        transform: strip
      - source: properties.hs_object_id
        target: hubspot_id
        transform: string
      - source: properties.hubspot_owner_id
        target: hs_owner_id
        transform: string
      - source: properties.email
        target: email
        transform: strip
      - source: properties.phone
        target: phone
        transform: strip
      - source: properties.jobtitle
        target: title
        transform: strip
      - source: properties.linkedin_primary_company
        target: linkedin
        transform: strip
      - source: properties.city
        target: city
        transform: strip
      - source: properties.country
        target: location_country
        transform: strip
      - source: properties.website
        target: website
        transform: strip
      - source: properties.lastname
        target: extra.last_name
        transform: strip
      - source: properties.hs_lead_status
        target: extra.source_system
        transform: const:hubspot

  company:
    table: nb_crm_customers
    fields:
      - source: properties.name
        target: name
        transform: strip
      - source: properties.hs_object_id
        target: hubspot_id
        transform: string
      - source: properties.hubspot_owner_id
        target: hs_owner_id
        transform: string
      - source: properties.vat_number__c
        target: vat_number
        transform: strip
      - source: properties.country
        target: country
        transform: upper
      - source: properties.industry
        target: industry
        transform: strip
      - source: properties.website
        target: website
        transform: strip
      - source: properties.phone
        target: phone
        transform: strip
      - source: properties.description
        target: description
        transform: strip
      - source: properties.linkedin_company_page
        target: linkedin_url
        transform: strip
      - source: properties.hs_lead_status
        target: extra.source_system
        transform: const:hubspot
