networks:
  coolify:
    external: true
  hatchet:
    driver: bridge

services:
  hatchet-dashboard:
    command: sh ./entrypoint.sh --config /hatchet/config
    depends_on:
      migration:
        condition: service_completed_successfully
      setup-config:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
    image: ghcr.io/hatchet-dev/hatchet/hatchet-dashboard:latest
    labels:
    - traefik.enable=true
    - traefik.http.routers.hatchet.rule=Host(`hatchet.integritasmrv.com`)
    - traefik.http.routers.hatchet.entrypoints=websecure
    - traefik.http.routers.hatchet.tls=true
    - traefik.http.routers.hatchet.tls.certresolver=letsencrypt
    - traefik.http.services.hatchet.loadbalancer.server.port=80
    networks:
    - hatchet
    - coolify
    ports:
    - 13009:80
    restart: on-failure
    volumes:
    - hatchet_config:/hatchet/config
    - ./nginx.conf:/etc/nginx/nginx.conf:ro

  hatchet-engine:
    command: /hatchet/hatchet-engine --config /hatchet/config
    depends_on:
      migration:
        condition: service_completed_successfully
      setup-config:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_INSECURE: t
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    networks:
    - hatchet
    - coolify
    ports:
    - 7070:7070
    - 8080:8080
    restart: on-failure
    volumes:
    - hatchet_config:/hatchet/config

  pg-listener:
    build:
      context: .
      dockerfile: listener/Dockerfile
    environment:
      CRM_DSN: postgresql://integritasmrv_crm_user:oYxxPKRfAHAD263VSDcKmljKY0vInx2QTl6PooKoqmmiDops@crm-integritasmrv-db:5432/integritasmrv_crm
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN}
      HATCHET_CLIENT_HOST_PORT: hatchet-engine:7070
      HATCHET_CLIENT_TLS_STRATEGY: none
    networks:
    - hatchet
    - coolify
    restart: always
    depends_on:
    - hatchet-engine

  migration:
    command: /hatchet/hatchet-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
    image: ghcr.io/hatchet-dev/hatchet/hatchet-migrate:latest
    networks:
    - hatchet
    - coolify

  postgres:
    command: postgres -c 'max_connections=1000'
    environment:
    - POSTGRES_USER=hatchet
    - POSTGRES_PASSWORD=hatchet
    - POSTGRES_DB=hatchet
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test:
      - CMD-SHELL
      - pg_isready -d hatchet -U hatchet
      timeout: 10s
    hostname: postgres
    image: postgres:15.6
    networks:
    - hatchet
    - coolify
    restart: always
    volumes:
    - hatchet_postgres_data:/var/lib/postgresql/data

  setup-config:
    command: /hatchet/hatchet-admin quickstart --skip certs --generated-config-dir /hatchet/config --overwrite=false
    depends_on:
      migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
      SERVER_AUTH_COOKIE_DOMAIN: hatchet.integritasmrv.com
      SERVER_AUTH_COOKIE_INSECURE: t
      SERVER_DEFAULT_ENGINE_VERSION: V1
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
      SERVER_GRPC_INSECURE: t
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
      SERVER_MSGQUEUE_KIND: postgres
    image: ghcr.io/hatchet-dev/hatchet/hatchet-admin:latest
    networks:
    - hatchet
    volumes:
    - hatchet_config:/hatchet/config

version: '3.8'
volumes:
  hatchet_config: null
  hatchet_postgres_data: null
